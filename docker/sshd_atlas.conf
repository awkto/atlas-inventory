# SFTP-only sshd for Atlas HA replication.
# Serves a single user (atlas) over SFTP, chrooted to the replica inbound
# directory. No shell, no port forwarding, no anything else.
Port 22
ListenAddress 0.0.0.0

# Host keys persist on the data volume so peers don't see "host key changed"
# warnings across container recreations.
HostKey /data/ssh-host-keys/ssh_host_ed25519_key
HostKey /data/ssh-host-keys/ssh_host_rsa_key

PasswordAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
PermitRootLogin no
UsePAM no

# /data is a bind-mounted Docker volume owned by the host user, not by root
# or atlas — the default StrictModes check rejects authorized_keys under it.
# Disabling is safe here: the file is 0600 atlas:atlas, sshd only allows
# atlas, and atlas is chrooted to a different subdirectory.
StrictModes no

# Single trusted file managed by Atlas.
AuthorizedKeysFile /data/atlas-authorized_keys

AllowUsers atlas
PermitEmptyPasswords no

# Global directives have to come BEFORE the Match block — once we're inside
# Match, we're inside that block until EOF.
Subsystem sftp internal-sftp
LogLevel INFO
PidFile /run/sshd-atlas.pid

# Strict SFTP-only chroot. The chroot dir + every ancestor must be root-owned
# (sshd refuses otherwise), so we use /srv/replica-inbound — a path inside
# the image, intended to be mounted as a Docker-managed named volume so its
# ownership remains root. (/data is bind-mounted from the host user and
# can't satisfy sshd's chroot requirements.)
Match User atlas
    ChrootDirectory /srv/replica-inbound
    ForceCommand internal-sftp
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no
    AllowAgentForwarding no
