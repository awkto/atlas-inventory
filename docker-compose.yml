services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:////data/atlas.db
      - NOAUTH=${NOAUTH:-}
      - MCP_ENABLED=${MCP_ENABLED:-true}
      # --- HA (optional) ---
      # Pair the two nodes from the Cluster page in the UI; no env vars
      # required for normal operation.
      - HA_ENABLED=${HA_ENABLED:-}
      - HA_SELF_ID=${HA_SELF_ID:-A}
      - HA_INITIAL_ROLE=${HA_INITIAL_ROLE:-primary}
      - HA_PEER_URL=${HA_PEER_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      # --- Backups ---
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-900}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      # --- Settings encryption ---
      # KEK for Fernet-wrapping secrets in the settings table. Unset →
      # auto-generated and persisted to /data/settings-kek on first run.
      # Pairing automatically syncs the KEK to the peer; you only need to
      # set this manually if you're restoring without going through pairing.
      - SETTINGS_KEK=${SETTINGS_KEK:-}
    volumes:
      - atlas-data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3080:80"
    depends_on:
      - backend

volumes:
  atlas-data:
