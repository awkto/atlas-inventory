services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:////data/atlas.db
      - NOAUTH=${NOAUTH:-}
      - MCP_ENABLED=${MCP_ENABLED:-true}
    volumes:
      - atlas-data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3080:80"
    depends_on:
      - backend

volumes:
  atlas-data:
